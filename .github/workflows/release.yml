name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config rpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Build Debian Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p debbuild/usr/bin
          mkdir -p debbuild/usr/share/applications
          mkdir -p debbuild/usr/share/icons/hicolor/512x512/apps
          mkdir -p debbuild/DEBIAN
          
          cp target/release/vapor debbuild/usr/bin/vapor
          cp assets/vapor.desktop debbuild/usr/share/applications/vapor.desktop
          cp assets/vapor.png debbuild/usr/share/icons/hicolor/512x512/apps/vapor.png
          
          cat << EOF > debbuild/DEBIAN/control
          Package: vapor
          Version: ${VERSION}
          Section: games
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1, libadwaita-1-0
          Maintainer: Tiam <tiam@fedora.fritz.box>
          Description: Lightweight GNOME-native Steam companion client
           Vapor is a lightweight, modern companion client for Steam built in Rust.
          EOF
          
          dpkg-deb --build debbuild vapor_${VERSION}_amd64.deb

      - name: Build RPM Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp target/release/vapor rpmbuild/SOURCES/
          cp assets/vapor.desktop rpmbuild/SOURCES/
          cp assets/vapor.png rpmbuild/SOURCES/
          
          cat << EOF > rpmbuild/SPECS/vapor.spec
          Name:           vapor
          Version:        ${VERSION}
          Release:        1
          Summary:        Lightweight GNOME-native Steam companion client
          License:        MIT
          URL:            https://github.com/tiammue/vapor
          
          %description
          Vapor is a lightweight, modern companion client for Steam built in Rust.
          
          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/icons/hicolor/512x512/apps
          install -m 755 %{_sourcedir}/vapor %{buildroot}/usr/bin/vapor
          install -m 644 %{_sourcedir}/vapor.desktop %{buildroot}/usr/share/applications/vapor.desktop
          install -m 644 %{_sourcedir}/vapor.png %{buildroot}/usr/share/icons/hicolor/512x512/apps/vapor.png
          
          %files
          /usr/bin/vapor
          /usr/share/applications/vapor.desktop
          /usr/share/icons/hicolor/512x512/apps/vapor.png
          EOF
          
          rpmbuild -bb --define "_topdir $(pwd)/rpmbuild" rpmbuild/SPECS/vapor.spec
          cp rpmbuild/RPMS/x86_64/vapor-*.rpm ./

      - name: Package portable source tarball
        run: |
          mkdir dist
          cp target/release/vapor dist/
          cp Makefile dist/
          cp -r assets dist/
          tar -czf vapor-linux.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vapor-linux.tar.gz
            *.deb
            *.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
